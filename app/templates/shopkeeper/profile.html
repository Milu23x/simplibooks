{% extends "base.html" %}
{% block title %}Business Profile - SimpliBooks{% endblock %}
{% block content %}

<h4 class="mb-3">Business Profile</h4>

<form method="POST" class="card p-4" style="max-width: 600px;">
  <div class="mb-3">
    <label class="form-label">Business Name</label>
    <input type="text" name="business_name" class="form-control" value="{{ biz.business_name }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">GSTIN</label>
    <input type="text" name="gstin" class="form-control" value="{{ biz.gstin or '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">State</label>
    <input type="text" name="state" class="form-control" value="{{ biz.state or '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Address</label>
    <textarea name="address" class="form-control" rows="2">{{ biz.address or '' }}</textarea>
  </div>
  <div class="mb-3">
    <label class="form-label">Phone</label>
    <input type="text" name="phone" class="form-control" value="{{ biz.phone or '' }}">
  </div>
  <button type="submit" class="btn btn-primary">Save Changes</button>
</form>
{% endblock %}
