{% extends "base.html" %}
{% block title %}New Invoice - SimpliBooks{% endblock %}
{% block content %}

<h4 class="mb-3">Create Invoice</h4>

<form method="POST" class="card p-4">
  <div class="row g-3 mb-3">
    <div class="col-md-6">
      <label class="form-label">Customer Name</label>
      <input type="text" name="customer_name" class="form-control" required>
    </div>
    <div class="col-md-6">
      <label class="form-label">Customer State (for GST type)</label>
      <input type="text" name="customer_state" class="form-control" placeholder="e.g. Maharashtra">
    </div>
  </div>

  <h6 class="mt-2 mb-2">Items</h6>
  <div class="table-responsive">
    <table class="table" id="itemsTable">
      <thead>
        <tr>
          <th>Item</th>
          <th style="width:100px;">Qty</th>
          <th style="width:130px;">Rate (₹)</th>
          <th style="width:150px;">Tax Rate</th>
          <th style="width:40px;"></th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><input type="text" name="item_name" class="form-control" required></td>
          <td><input type="number" step="0.01" name="item_qty" class="form-control" value="1" required></td>
          <td><input type="number" step="0.01" name="item_rate" class="form-control" value="0" required></td>
          <td>
            <select name="item_tax" class="form-select">
              {% for t in tax_rates %}
              <option value="{{ t.percentage }}">{{ t.label }}</option>
              {% endfor %}
            </select>
          </td>
          <td><button type="button" class="btn btn-sm btn-outline-danger remove-row"><i class="bi bi-x"></i></button></td>
        </tr>
      </tbody>
    </table>
  </div>
  <button type="button" id="addRow" class="btn btn-sm btn-outline-secondary mb-4"><i class="bi bi-plus"></i> Add Item</button>

  <div>
    <button type="submit" class="btn btn-primary">Save Invoice</button>
    <a href="{{ url_for('shopkeeper.invoices') }}" class="btn btn-outline-secondary">Cancel</a>
  </div>
</form>

{% endblock %}

{% block scripts %}
<script>
  const table = document.getElementById('itemsTable').querySelector('tbody');
  document.getElementById('addRow').addEventListener('click', () => {
    const row = table.rows[0].cloneNode(true);
    row.querySelectorAll('input').forEach(i => i.value = i.type === 'number' ? (i.name === 'item_qty' ? 1 : 0) : '');
    table.appendChild(row);
  });
  table.addEventListener('click', (e) => {
    if (e.target.closest('.remove-row') && table.rows.length > 1) {
      e.target.closest('tr').remove();
    }
  });
</script>
{% endblock %}
