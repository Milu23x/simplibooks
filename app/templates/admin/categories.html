{% extends "base.html" %}
{% block title %}Categories - SimpliBooks Admin{% endblock %}
{% block content %}

<h4 class="mb-3">Expense Categories</h4>

<div class="card p-3 mb-3">
  <form method="POST" class="row g-2">
    <div class="col-md-4">
      <input type="text" name="name" class="form-control" placeholder="New category name" required>
    </div>
    <div class="col-md-2">
      <button class="btn btn-primary w-100" type="submit">Add</button>
    </div>
  </form>
</div>

<div class="card p-3">
  <table class="table align-middle">
    <thead><tr><th>Category</th><th></th></tr></thead>
    <tbody>
      {% for c in categories %}
      <tr>
        <td>{{ c.name }}</td>
        <td>
          <form method="POST" action="{{ url_for('admin.delete_category', cat_id=c.id) }}" onsubmit="return confirm('Remove this category?');">
            <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="2" class="text-center text-muted py-3">No categories yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
